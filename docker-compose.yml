services:
  web:
    build: .
    command: waitress-serve --port=8000 config.wsgi:application
    volumes:
      - .:/app                          # Mount code
      - ./db.sqlite3:/app/db.sqlite3    # ✅ EXPLICIT database mount (persists it)
      - media_volume:/app/media
      - vector_db_volume:/app/vector_db  # ✅ Critical: persist vector indexes
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  worker:
    build: .
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - ./db.sqlite3:/app/db.sqlite3    # ✅ SAME database mount for worker
      - media_volume:/app/media
      - vector_db_volume:/app/vector_db  # ✅ Same volume as web
    env_file: .env
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 200mb
    ports:
      - "6379:6379"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - media_volume:/app/media
      - ./rag/templates:/usr/share/nginx/html
    depends_on:
      - web
    restart: unless-stopped

volumes:
  media_volume:
  vector_db_volume:
  ollama_data: